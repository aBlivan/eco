<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Эко-патруль — AR квест</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
            background: black;
        }
        
        /* Счётчик */
        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            z-index: 200;
            text-align: center;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 14px;
        }
        .score-num {
            font-size: 32px;
            color: #4CAF50;
            font-weight: 800;
        }
        
        /* Нижняя панель */
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            color: white;
            z-index: 200;
            border-left: 5px solid #4CAF50;
        }
        .info-title {
            font-size: 14px;
            color: #4CAF50;
            margin-bottom: 5px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .info-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        /* Кнопка запуска */
        .start-btn {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: #4CAF50;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            z-index: 300;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: 0.2s;
        }
        .start-btn:active {
            transform: translateX(-50%) scale(0.97);
        }
        
        /* Поздравление */
        .congrats {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            padding: 25px 35px;
            border-radius: 25px;
            text-align: center;
            z-index: 400;
            font-size: 20px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        
        .hidden {
            display: none;
        }
        
        a-scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <!-- Счётчик (сначала скрыт) -->
    <div class="score hidden" id="scorePanel">
        🌍 НАЙДЕНО<br>
        <span class="score-num" id="scoreCount">0</span>/4
    </div>

    <!-- Нижняя панель (сначала скрыта) -->
    <div class="info hidden" id="infoPanel">
        <div class="info-title">♻️ ЭКО-ПАТРУЛЬ</div>
        <div class="info-text" id="infoMsg">Наведи на предметы</div>
    </div>

    <!-- Кнопка запуска -->
    <button class="start-btn" id="startBtn">📷 НАЧАТЬ КВЕСТ</button>

    <!-- AR сцена -->
    <a-scene 
        id="scene" 
        mindar-image="imageTargetSrc: targets.mind;" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded>
        
        <a-camera active="true"></a-camera>
        
        <!-- Триггер 0: Батарейка -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#FF5722" opacity="0.95">
                <a-text value="🔋 БАТАРЕЙКА: Одна батарейка загрязняет 20 м² земли и 400 литров воды. Содержит ртуть и свинец!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <!-- Триггер 1: Пластиковая бутылка -->
        <a-entity mindar-image-target="targetIndex: 1">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#4CAF50" opacity="0.95">
                <a-text value="🍼 БУТЫЛКА: Разлагается 450 лет! Убивает морских животных. Микропластик попадает в еду!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <!-- Триггер 2: Одноразовый стаканчик -->
        <a-entity mindar-image-target="targetIndex: 2">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#2196F3" opacity="0.95">
                <a-text value="🥤 СТАКАНЧИК: 1 дерево на 1000 стаканов. Внутри пластиковая плёнка — НЕ перерабатывается!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <!-- Триггер 3: Аэрозольный баллончик -->
        <a-entity mindar-image-target="targetIndex: 3">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#9C27B0" opacity="0.95">
                <a-text value="💨 БАЛЛОНЧИК: Разрушает озоновый слой, вызывает смог и болезни дыхания. Выбирай без аэрозоля!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        let found = 0;
        let collected = [false, false, false, false];
        let gameEnded = false;
        let arStarted = false;
        
        const scorePanel = document.getElementById('scorePanel');
        const infoPanel = document.getElementById('infoPanel');
        const infoMsg = document.getElementById('infoMsg');
        const scoreSpan = document.getElementById('scoreCount');
        const sceneEl = document.getElementById('scene');
        const startBtn = document.getElementById('startBtn');
        
        const ecoTexts = [
            "🔋 Батарейка найдена! +1. Сдавай батарейки в специальные пункты приёма!",
            "🍼 Бутылка найдена! +1. Используй многоразовую бутылку для воды!",
            "🥤 Стаканчик найден! +1. Бери с собой термокружку в кофейню!",
            "💨 Баллончик найден! +1. Выбирай продукты в формате без аэрозоля (пшикалка)!"
        ];
        
        function updateUI() {
            scoreSpan.textContent = found;
            if (found === 4 && !gameEnded) {
                gameEnded = true;
                const div = document.createElement('div');
                div.className = 'congrats';
                div.innerHTML = '🎉 ПОЗДРАВЛЯЮ! 🎉<br>Ты эко-герой! 🌿<br><span style="font-size: 14px;">Спас планету от мусора</span>';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 5000);
                infoMsg.innerHTML = "Ура! Ты собрал все 4 предмета! Так держать! ♻️";
            }
        }
        
        async function startAR() {
            if (arStarted) return;
            
            startBtn.textContent = "🔄 ЗАПУСК...";
            startBtn.disabled = true;
            
            try {
                // Показываем сцену
                sceneEl.style.display = "block";
                
                // Ждём загрузки компонента MindAR
                let waits = 0;
                while (!sceneEl.components || !sceneEl.components['mindar-image']) {
                    await new Promise(r => setTimeout(r, 100));
                    waits++;
                    if (waits > 50) throw new Error("MindAR не загрузился");
                }
                
                // Запускаем камеру
                await sceneEl.components['mindar-image'].start();
                arStarted = true;
                
                // Прячем кнопку, показываем панели
                startBtn.style.display = 'none';
                scorePanel.classList.remove('hidden');
                infoPanel.classList.remove('hidden');
                infoMsg.innerHTML = "✅ Камера работает! Наведи на настоящие предметы: бутылку, батарейку, стаканчик, баллончик";
                
                // Слушаем находки
                sceneEl.addEventListener('mindar-image-target-found', (e) => {
                    const idx = e.detail.targetIndex;
                    if (!collected[idx] && !gameEnded) {
                        collected[idx] = true;
                        found++;
                        updateUI();
                        infoMsg.innerHTML = ecoTexts[idx];
                        if (navigator.vibrate) navigator.vibrate(100);
                        
                        setTimeout(() => {
                            if (found < 4 && !gameEnded) {
                                infoMsg.innerHTML = "📷 Отлично! Ищи дальше! Наведи на следующий предмет";
                            }
                        }, 4000);
                    }
                });
                
            } catch(err) {
                console.error(err);
                startBtn.textContent = "📷 ПОВТОРИТЬ";
                startBtn.disabled = false;
                infoMsg.innerHTML = "Ошибка: " + (err.message || "проверь разрешения камеры");
                sceneEl.style.display = "none";
            }
        }
        
        startBtn.addEventListener('click', startAR);
    </script>
</body>
</html>
