<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Эко-патруль — AR квест</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; background: black; }
        
        .score-card {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            padding: 10px 20px;
            color: white;
            z-index: 200;
            font-weight: bold;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 18px;
        }
        .score-number { font-size: 34px; font-weight: 800; color: #4CAF50; line-height: 1; }
        
        .ui-overlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 16px;
            color: white;
            z-index: 200;
            border-left: 5px solid #4CAF50;
        }
        .ui-title { font-weight: bold; font-size: 16px; color: #4CAF50; margin-bottom: 6px; }
        .ui-message { font-size: 15px; line-height: 1.4; }
        
        .congrats {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #1B5E20, #4CAF50);
            color: white;
            padding: 24px 32px;
            border-radius: 32px;
            text-align: center;
            z-index: 300;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <div class="score-card">
        🌍 НАЙДЕНО<br>
        <span class="score-number" id="scoreValue">0</span> / 4
    </div>

    <div class="ui-overlay">
        <div class="ui-title">♻️ ЭКО-ПАТРУЛЬ</div>
        <div class="ui-message" id="infoText">Наведи камеру на предметы: бутылка, батарейка, стаканчик, баллончик</div>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: targets.mind;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" embedded>
        <a-camera active="true"></a-camera>
        
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#FF5722" opacity="0.95">
                <a-text value="🔋 БАТАРЕЙКА: 20 м² земли в токсинах. Сдавай в пункты приёма!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#4CAF50" opacity="0.95">
                <a-text value="🍼 БУТЫЛКА: Разлагается 450 лет. Замени на многоразовую!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#2196F3" opacity="0.95">
                <a-text value="🥤 СТАКАНЧИК: Не перерабатывается. Бери термокружку!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3">
            <a-plane position="0 0 -0.15" width="1.5" height="1.0" color="#9C27B0" opacity="0.95">
                <a-text value="💨 БАЛЛОНЧИК: Разрушает озон. Выбирай без аэрозоля!" color="white" align="center" width="1.4" wrap-count="24" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        let found = 0;
        const total = 4;
        let completed = [false, false, false, false];
        
        const scoreSpan = document.getElementById('scoreValue');
        const infoDiv = document.getElementById('infoText');
        const scene = document.getElementById('scene');
        
        const messages = [
            "🔋 Батарейка найдена! +1 балл. Одна батарейка отравляет 20 м² земли.",
            "🍼 Бутылка найдена! +1 балл. Пластик разлагается 450 лет.",
            "🥤 Стаканчик найден! +1 балл. Бери с собой термокружку!",
            "💨 Баллончик найден! +1 балл. Аэрозоли разрушают озон."
        ];
        
        function updateScore() {
            scoreSpan.textContent = found;
            if (found === total && !window.gameEnded) {
                window.gameEnded = true;
                const div = document.createElement('div');
                div.className = 'congrats';
                div.innerHTML = '🎉 ТЫ ЭКО-ГЕРОЙ! 🎉<br>🌿 Спас планету от мусора 🌿';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 5000);
                infoDiv.innerHTML = "Поздравляем! Ты собрал все 4 предмета!";
            }
        }
        
        // Автоматически запускаем AR при загрузке страницы
        window.addEventListener('load', async () => {
            infoDiv.innerHTML = "🔄 Загрузка камеры...";
            
            // Ждём загрузки компонента
            const waitForMindAR = setInterval(() => {
                if (scene.components && scene.components['mindar-image']) {
                    clearInterval(waitForMindAR);
                    startAR();
                }
            }, 200);
        });
        
        async function startAR() {
            try {
                await scene.components['mindar-image'].start();
                infoDiv.innerHTML = "✅ Камера работает! Наведи на: бутылку, батарейку, стаканчик, баллончик";
                
                // Слушаем находки
                document.querySelector('a-scene').addEventListener('mindar-image-target-found', (e) => {
                    const idx = e.detail.targetIndex;
                    if (!completed[idx] && found < total) {
                        completed[idx] = true;
                        found++;
                        updateScore();
                        infoDiv.innerHTML = messages[idx];
                        if (navigator.vibrate) navigator.vibrate(100);
                        setTimeout(() => {
                            if (found < total) infoDiv.innerHTML = "📷 Ищи дальше! Наведи на следующий предмет";
                        }, 4000);
                    }
                });
            } catch(err) {
                console.error(err);
                infoDiv.innerHTML = "❌ Ошибка камеры. Обнови страницу и разреши доступ.";
            }
        }
    </script>
</body>
</html>
