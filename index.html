<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <title>Эко-патруль — AR квест</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; overflow: hidden; }
        .score-panel { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .score-box { background: rgba(0,0,0,0.8); border-radius: 30px; padding: 12px 20px; color: white; font-weight: bold; }
        .score-label { font-size: 12px; color: #4CAF50; }
        .score-value { font-size: 32px; font-weight: 800; margin: 0 5px; }
        .score-total { font-size: 18px; opacity: 0.7; }
        .info-panel { position: fixed; bottom: 20px; left: 20px; right: 20px; background: rgba(0,0,0,0.85); border-radius: 20px; padding: 15px; color: white; z-index: 100; border-left: 4px solid #4CAF50; }
        .info-title { font-weight: bold; font-size: 14px; color: #4CAF50; margin-bottom: 5px; }
        .info-text { font-size: 14px; line-height: 1.4; }
        .start-btn { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #4CAF50; color: white; border: none; padding: 14px 30px; border-radius: 50px; font-size: 18px; font-weight: bold; z-index: 200; cursor: pointer; }
        .congrats { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #4CAF50, #2E7D32); color: white; padding: 25px 35px; border-radius: 30px; text-align: center; z-index: 300; font-weight: bold; font-size: 20px; }
    </style>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body>
    <div class="score-panel">
        <div class="score-box">
            <span class="score-label">🌍 НАЙДЕНО</span>
            <span class="score-value" id="scoreValue">0</span>
            <span class="score-total">/4</span>
        </div>
    </div>

    <div class="info-panel" id="infoPanel">
        <div class="info-title">Эко-патруль</div>
        <div class="info-text" id="infoText">Нажми кнопку для запуска</div>
    </div>

    <button class="start-btn" id="startBtn">📷 ЗАПУСТИТЬ AR</button>

    <a-scene id="scene" embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-camera></a-camera>
        
        <!-- Маркер 0: Батарейка (hiro) -->
        <a-marker preset="hiro" id="marker0">
            <a-plane position="0 0 0" width="1.5" height="1.5" color="#FF5722" opacity="0.9"></a-plane>
        </a-marker>
    </a-scene>

    <script>
        let foundItems = 0;
        const totalItems = 4;
        let collected = [false, false, false, false];
        let gameFinished = false;
        let arStarted = false;

        const scoreElement = document.getElementById('scoreValue');
        const infoTextElement = document.getElementById('infoText');
        const startBtn = document.getElementById('startBtn');
        const scene = document.getElementById('scene');

        const messages = [
            "🔋 БАТАРЕЙКА: Одна батарейка загрязняет 20 м² земли и 400 литров воды! Содержит ртуть и свинец.",
            "🍼 БУТЫЛКА: Разлагается 450 лет! Убивает морских животных. Микропластик попадает в еду и воду.",
            "🥤 СТАКАНЧИК: 1 дерево на 1000 стаканов. Внутри пластиковая плёнка — НЕ перерабатывается!",
            "💨 БАЛЛОНЧИК: Разрушает озоновый слой, вызывает смог и болезни дыхания. Выбирай без аэрозоля!"
        ];

        function updateScore() {
            scoreElement.textContent = foundItems;
            if (foundItems === totalItems && !gameFinished) {
                gameFinished = true;
                const div = document.createElement('div');
                div.className = 'congrats';
                div.innerHTML = '🎉 ПОЗДРАВЛЯЕМ! 🎉<br>Ты эко-герой!<br><small>Ты спас планету! 🌿</small>';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 5000);
                infoTextElement.textContent = "Ура! Ты собрал все 4 предмета! 🌍";
            }
        }

        async function startAR() {
            if (arStarted) return;
            
            startBtn.textContent = "🔄 ЗАПУСК...";
            startBtn.disabled = true;
            
            try {
                // Запрашиваем доступ к камере вручную
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                stream.getTracks().forEach(track => track.stop());
                
                arStarted = true;
                startBtn.style.display = 'none';
                infoTextElement.textContent = "✅ Камера работает! Наведи на маркер Hiro (чёрно-белый квадрат)";
                
                // Слушаем появление маркера
                const marker = document.getElementById('marker0');
                let markerFound = false;
                
                marker.addEventListener('markerFound', () => {
                    if (!markerFound && !gameFinished && foundItems < totalItems) {
                        markerFound = true;
                        const idx = foundItems; // по порядку: сначала батарейка, потом бутылка и т.д.
                        if (!collected[idx]) {
                            collected[idx] = true;
                            foundItems++;
                            updateScore();
                            infoTextElement.innerHTML = `<strong>🔍 НАЙДЕНО!</strong><br>${messages[idx]}`;
                            if (navigator.vibrate) navigator.vibrate(200);
                            setTimeout(() => {
                                if (foundItems < totalItems && !gameFinished) {
                                    infoTextElement.innerHTML = "📷 Отличная работа! Наведи на следующий маркер (тот же Hiro)";
                                }
                            }, 5000);
                        }
                    }
                });
                
                marker.addEventListener('markerLost', () => {
                    markerFound = false;
                });
                
            } catch(err) {
                console.error(err);
                startBtn.textContent = "❌ НАЖМИ СНОВА";
                startBtn.disabled = false;
                infoTextElement.textContent = "Ошибка: " + (err.message || "проверь разрешения камеры");
            }
        }

        startBtn.addEventListener('click', startAR);
    </script>
</body>
</html>
