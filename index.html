<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Эко-патруль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: black;
        }
        
        /* Счётчик */
        .score {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 10px 18px;
            color: white;
            z-index: 100;
            text-align: center;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .score-num {
            font-size: 32px;
            color: #4CAF50;
        }
        
        /* Нижняя панель */
        .info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            padding: 15px;
            color: white;
            z-index: 100;
            border-left: 5px solid #4CAF50;
        }
        .info-title {
            font-size: 14px;
            color: #4CAF50;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .info-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        /* Поздравление */
        .congrats {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(135deg, #2E7D32, #4CAF50);
            color: white;
            padding: 25px;
            border-radius: 25px;
            text-align: center;
            z-index: 200;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* Контейнер для AR */
        .ar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        a-scene {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.0/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

    <div class="score">
        🌍 НАЙДЕНО<br>
        <span class="score-num" id="scoreCount">0</span>/4
    </div>

    <div class="info">
        <div class="info-title">♻️ ЭКО-ПАТРУЛЬ</div>
        <div class="info-text" id="infoMsg">Загрузка камеры...</div>
    </div>

    <a-scene 
        id="scene" 
        mindar-image="imageTargetSrc: targets.mind;" 
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
        embedded
        style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;">
        
        <a-camera active="true"></a-camera>
        
        <!-- Квадраты с текстом -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-plane position="0 0 -0.15" width="1.4" height="0.9" color="#FF5722" opacity="0.95">
                <a-text value="🔋 БАТАРЕЙКА: Одна батарейка загрязняет 20 м² земли" color="white" align="center" width="1.3" wrap-count="20" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 1">
            <a-plane position="0 0 -0.15" width="1.4" height="0.9" color="#4CAF50" opacity="0.95">
                <a-text value="🍼 БУТЫЛКА: Разлагается 450 лет, убивает животных" color="white" align="center" width="1.3" wrap-count="20" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 2">
            <a-plane position="0 0 -0.15" width="1.4" height="0.9" color="#2196F3" opacity="0.95">
                <a-text value="🥤 СТАКАНЧИК: Не перерабатывается, бери термокружку" color="white" align="center" width="1.3" wrap-count="20" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>

        <a-entity mindar-image-target="targetIndex: 3">
            <a-plane position="0 0 -0.15" width="1.4" height="0.9" color="#9C27B0" opacity="0.95">
                <a-text value="💨 БАЛЛОНЧИК: Разрушает озоновый слой" color="white" align="center" width="1.3" wrap-count="20" position="0 0 0.01"></a-text>
            </a-plane>
        </a-entity>
    </a-scene>

    <script>
        let found = 0;
        let collected = [false, false, false, false];
        let gameEnded = false;
        
        const scoreSpan = document.getElementById('scoreCount');
        const infoMsg = document.getElementById('infoMsg');
        const sceneEl = document.getElementById('scene');
        
        const ecoTexts = [
            "🔋 Батарейка найдена! +1. Сдавай в пункты приёма!",
            "🍼 Бутылка найдена! +1. Используй многоразовую!",
            "🥤 Стаканчик найден! +1. Бери термокружку!",
            "💨 Баллончик найден! +1. Выбирай без аэрозоля!"
        ];
        
        function updateUI() {
            scoreSpan.textContent = found;
            if (found === 4 && !gameEnded) {
                gameEnded = true;
                const div = document.createElement('div');
                div.className = 'congrats';
                div.innerHTML = '🎉 ПОЗДРАВЛЯЮ! 🎉<br>Ты эко-герой! 🌿';
                document.body.appendChild(div);
                setTimeout(() => div.remove(), 5000);
                infoMsg.innerHTML = "Ура! Ты собрал все 4 предмета! Спасибо за заботу о планете!";
            }
        }
        
        // Запускаем AR
        async function initAR() {
            infoMsg.innerHTML = "🔄 Запуск камеры...";
            
            // Ждём пока компонент загрузится
            let tries = 0;
            const waitForComponent = setInterval(() => {
                tries++;
                if (sceneEl.components && sceneEl.components['mindar-image']) {
                    clearInterval(waitForComponent);
                    startMindAR();
                } else if (tries > 30) {
                    clearInterval(waitForComponent);
                    infoMsg.innerHTML = "❌ Ошибка. Обнови страницу и разреши доступ к камере.";
                }
            }, 200);
        }
        
        async function startMindAR() {
            try {
                await sceneEl.components['mindar-image'].start();
                infoMsg.innerHTML = "✅ Камера работает! Наведи на: бутылку, батарейку, стаканчик, баллончик";
                
                // Слушаем находки
                sceneEl.addEventListener('mindar-image-target-found', (e) => {
                    const idx = e.detail.targetIndex;
                    if (!collected[idx] && !gameEnded) {
                        collected[idx] = true;
                        found++;
                        updateUI();
                        infoMsg.innerHTML = ecoTexts[idx];
                        if (navigator.vibrate) navigator.vibrate(100);
                        
                        setTimeout(() => {
                            if (found < 4 && !gameEnded) {
                                infoMsg.innerHTML = "📷 Ищи дальше! Наведи на следующий предмет";
                            }
                        }, 3500);
                    }
                });
            } catch(err) {
                console.error(err);
                infoMsg.innerHTML = "❌ Ошибка камеры. Обнови страницу и разреши доступ к камере в Safari.";
            }
        }
        
        // Стартуем после загрузки страницы
        window.addEventListener('load', () => {
            setTimeout(initAR, 500);
        });
    </script>
</body>
</html>
